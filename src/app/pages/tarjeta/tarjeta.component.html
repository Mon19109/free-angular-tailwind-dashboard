<div class="container-fluid page-container">

  <!-- FILTROS -->
  <div class="filter-card">

    <form [formGroup]="formulario" (ngSubmit)="onSubmit()">

      <div class="row">

        <!-- ENTIDAD -->
        <div class="col-md-5">

          <div class="form-group">

            <label class="form-label">
              Entidad
            </label>

        <select
  formControlName="entidad"
  class="form-select">

  <option value="">
    Seleccione una entidad
  </option>

  <option
    *ngFor="let cuenta of cuentas"
    [value]="cuenta.bundle">

    {{ cuenta.bundle }} - {{ cuenta.bussinesName }}

  </option>

</select>

          </div>

        </div>

        <!-- TARJETA -->
        <div class="col-md-5">

          <div class="form-group">

            <label class="form-label">
              Tarjeta / Teléfono / Correo Electrónico
            </label>

            @if(user?.commerceType == 'CARD'){

              <input
                class="form-control"
                formControlName="tarjeta"
                [value]="user?.mail">

            }@else{

              <input
                class="form-control"
                formControlName="tarjeta">

            }

          </div>

        </div>

        <!-- BOTON -->
        <div class="col-md-2">

          <button
            type="submit"
            class="btn-buscar">

            <i class="fas fa-search"></i>
            Buscar

          </button>

        </div>

      </div>

    </form>

  </div>

  <!-- TARJETA -->

  <div class="transactions-card">

  @if(mostrarTarjeta){

    <div class="card-preview-wrapper">

      <div class="card-container">

       <img
  src="/tarjetakash.png"
  class="card-img">

        <div class="card-number">
          {{ cardNumberDisplay }}
        </div>

        <div class="card-name">
          {{ cardNameDisplay }}
        </div>

      </div>

    </div>

  }@else{

    <div class="empty-message">

      {{ mensaje || 'Datos no encontrados' }}

    </div>

  }

</div>

</div>
