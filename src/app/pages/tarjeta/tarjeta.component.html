<div class="operations-shell page-container">

  <!-- FILTROS -->
  <article class="operation-card filter-card">

    <header class="operation-card-header">
      <div>
        <span class="eyebrow">Filtros</span>
        <h2>Busqueda de tarjeta</h2>
      </div>
    </header>

    <div class="operation-card-body">
      <section class="operation-section">
        <div class="section-heading">
          <h3>Datos de busqueda</h3>
          <p>Define la entidad y el dato de consulta para localizar una tarjeta.</p>
        </div>

    <form [formGroup]="formulario" (ngSubmit)="onSubmit()">

      <div class="card-form-grid row">

        <!-- ENTIDAD -->
        <div class="card-field col-md-5">

          <div class="form-group">

            <label class="form-label">
              Entidad
            </label>

        <select
  formControlName="entidad"
  class="form-select">

  <option value="">
    Seleccione una entidad
  </option>

  <option
    *ngFor="let cuenta of cuentas"
    [value]="cuenta.bundle">

    {{ cuenta.bundle }} - {{ cuenta.bussinesName }}

  </option>

</select>

          </div>

        </div>

        <!-- TARJETA -->
        <div class="card-field col-md-5">

          <div class="form-group">

            <label class="form-label">
              Tarjeta / Teléfono / Correo Electrónico
            </label>

            @if(user?.commerceType == 'CARD'){

              <input
                class="form-control"
                formControlName="tarjeta"
                [value]="user?.mail">

            }@else{

              <input
                class="form-control"
                formControlName="tarjeta">

            }

          </div>

        </div>

        <!-- BOTON -->
        <div class="card-actions col-md-2">

          <button
            type="submit"
            class="button primary btn-buscar">

            Buscar

          </button>

        </div>

      </div>

    </form>

      </section>
    </div>

  </article>

  <!-- TARJETA -->

  <article class="operation-card transactions-card">

  <header class="operation-card-header">
    <div>
      <span class="eyebrow">Resultado</span>
      <h2>Tarjeta</h2>
    </div>
  </header>

  <div class="operation-card-body">
    <section class="operation-section results-section">

  @if(mostrarTarjeta){

    <div class="card-preview-wrapper">

      <div class="card-container">

       <img
  src="/tarjetakash.png"
  class="card-img">

        <div class="card-number">
          {{ cardNumberDisplay }}
        </div>

        <div class="card-name">
          {{ cardNameDisplay }}
        </div>

      </div>

    </div>

  }@else{

    <div class="empty-message">

      {{ mensaje || 'Datos no encontrados' }}

    </div>

  }

    </section>
  </div>

</article>

</div>
