<!-- Sidebar Top / Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary fixed-top shadow-lg">
  <div class="container-fluid">
    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center" routerLink="/dashboard">
      <div class="logo-icon me-2">
        <i class="bi bi-grid-1x2-fill"></i>
      </div>
      <span class="fw-bold fs-5">Kashpay</span>
    </a>

    <!-- Botón hamburguesa -->
    <button class="navbar-toggler border-0" 
            type="button" 
            (click)="isMenuCollapsed = !isMenuCollapsed">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menú principal -->
    <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <!-- ✅ Usando routerLink para navegación real -->
        <li class="nav-item">
          <a class="nav-link" 
             routerLink="/dashboard" 
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">
            <i class="bi bi-speedometer2 me-1"></i> Panel Principal
          </a>
        </li>

        <li class="nav-item dropdown" ngbDropdown>
          <a class="nav-link dropdown-toggle" ngbDropdownToggle>
            <i class="bi bi-graph-up me-1"></i> Reportes
          </a>

          <div ngbDropdownMenu class="shadow border-0">
            <p class="dropdown-item">Adquirencia</p>
            <a ngbDropdownItem routerLink="/operaciones_adquirencia" routerLinkActive="active">
              <i class="bi bi-bar-chart me-2"></i> Operaciones
            </a>
            <a ngbDropdownItem routerLink="/transacciones_adquirencia" routerLinkActive="active">
              <i class="bi bi-bar-chart-fill me-2"></i> Transacciones
            </a>
            <div class="dropdown-divider"></div>
            <p class="dropdown-item">Emisión</p>
            <a ngbDropdownItem routerLink="/operaciones_emision" routerLinkActive="active">
              <i class="bi bi-bar-chart me-2"></i> Operaciones
            </a>
            <a ngbDropdownItem routerLink="/transacciones_emision" routerLinkActive="active">
              <i class="bi bi-bar-chart-fill me-2"></i> Transacciones
            </a>
            <a ngbDropdownItem routerLink="/tarjeta" routerLinkActive="active">
              <i class="bi bi-credit-card-2-front me-2"></i> Tarjeta
            </a>            
            <div class="dropdown-divider"></div>
            <a ngbDropdownItem routerLink="/usuarios" routerLinkActive="active">
              <i class="bi bi-people-fill me-2"></i> Usuarios
            </a>            
            <div class="dropdown-divider"></div>
            <a ngbDropdownItem routerLink="/estado_cuenta" routerLinkActive="active">
              <i class="bi bi-file-earmark-ruled me-2"></i> Estado de cuenta
            </a>
            <div class="dropdown-divider"></div>
            <a ngbDropdownItem routerLink="/saldos" routerLinkActive="active">
              <i class="bi bi-currency-dollar me2"></i> Saldos
            </a>
          </div>
        </li>

       
      </ul>

      <!-- Perfil usuario -->
      <ul class="navbar-nav">
        <li class="nav-item" ngbDropdown>
          <a class="nav-link dropdown-toggle d-flex align-items-center" ngbDropdownToggle>
            <img src="" 
                 class="rounded-circle me-2" 
                 width="32" 
                 height="32">
            <span class="d-none d-lg-block">{{user?.mail || 'Admin'}}</span>
          </a>
          <div ngbDropdownMenu class="dropdown-menu-end shadow border-0">
            <a ngbDropdownItem routerLink="/estado_cuenta">
              <i class="bi bi-person-circle me-2"></i> Estado de cuenta
            </a>
            <a ngbDropdownItem routerLink="/tarjeta">
              <i class="bi bi-sliders2 me-2"></i> Tarjeta
            </a>
            <div class="dropdown-divider"></div>
            <a ngbDropdownItem (click)="onLogout()" class="text-danger">
              <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div style="height: 70px;"></div>
