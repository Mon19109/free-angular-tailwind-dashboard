<main class="invitation-shell page-container">
  <article class="invitation-card">
    <header class="invitation-card-header">
      <div>
        <span class="eyebrow">Comercios</span>
        <h1>Enviar invitación a comercio</h1>
      </div>
    </header>

    <section class="invitation-card-body">
      <p class="intro">
        Genera más Comisiones, envia una invitación a un nuevo comercio para ser parte de Kashpay.
      </p>

      <form class="invitation-form" (ngSubmit)="continuar()">
        <label class="form-field">
          <span>Correo Electrónico*</span>
          <input
            type="email"
            name="correoElectronico"
            [(ngModel)]="correoElectronico"
            [disabled]="cargando"
            autocomplete="email" />
        </label>

        <label class="form-field">
          <span>Nombre:</span>
          <input
            type="text"
            name="nombre"
            [(ngModel)]="nombre"
            [disabled]="cargando"
            autocomplete="name" />
        </label>

        @if (mensaje) {
          <div class="status-message success">{{ mensaje }}</div>
        }

        @if (error) {
          <div class="status-message error">{{ error }}</div>
        }

        <div class="actions">
          <button type="submit" class="button primary" [disabled]="cargando">
            {{ cargando ? 'Enviando...' : 'Continuar' }}
          </button>
          <button type="button" class="button secondary" [disabled]="cargando" (click)="cancelar()">Cancelar</button>
        </div>
      </form>
    </section>
  </article>
</main>
