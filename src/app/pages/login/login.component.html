<!-- login.component.html -->
<div class="login-container bg-login">
  <div class="login-card">
    <div class="login-header">
      <img src="https://portal-antares.kashplataforma.com/public/assets/img/kashpay_dorado.png" alt="Logo" class="logo">
      <!--h4>Bienvenido</h4>
      <p>Ingresa tus credenciales para continuar</p-->
      <p class="text-muted">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          placeholder="usuario@ejemplo.com"
        />
        <div class="invalid-feedback" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Correo requerido
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            placeholder="Ingrese su contraseña"
          />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Contraseña requerida</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-group" *ngIf="errorMessage">
        <div class="alert alert-danger">
          {{ errorMessage }}
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="text-center position-relative my-4">
              <hr>
              <span class="px-3 bg-white position-relative text-muted" style="top: -12px;">
                O se parte de Kashpay
              </span>
            </div>

            <!-- Botones Sociales -->
            <div class="d-grid gap-2">
              <button type="button" (click)="modalPreregistro($event)" class="btn-dorado inline-flex items-center justify-center gap-3 py-3 text-sm font-normal  transition-colors rounded-lg px-7 hover:bg-gray-200 hover:text-gray-800 dark:bg-white/5 dark:text-white/90 dark:hover:bg-white/10">
                <i class="bi bi-google me-2"></i> Inicar Pre registro
              </button>
            </div>

            <!-- Link Registro -->
            <div class="text-center mt-4">
              <p class="mb-0">
                ¿Olvidaste tu contraseña? 
                <a href="#" class="text-decoration-none fw-bold" >
                  Recuperar cuenta
                </a>
              </p>
            </div>
    </form>
  </div>
</div>
@if (showPreregistroModal) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl dark:bg-gray-900">
      <app-formulario-modal
        titulo="Formulario de contacto"
        (closed)="showPreregistroModal = false"
      />
    </div>
  </div>
}
