<!-- login.component.html -->
<div class="login-container bg-login">
  <div class="login-card">
    <div class="login-header">
      <img src="https://portal-antares.kashplataforma.com/public/assets/img/kashpay_dorado.png" alt="Logo" class="logo">
      <!--h4>Bienvenido</h4>
      <p>Ingresa tus credenciales para continuar</p-->
      <h2 class="fw-bold text-gradient">Bienvenido</h2>
      <p class="text-muted">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          [class.is-invalid]="email?.invalid && email?.touched"
          placeholder="usuario@ejemplo.com"
        />
        <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
          <span *ngIf="email?.errors?.['email']">Ingrese un correo válido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            [class.is-invalid]="password?.invalid && password?.touched"
            placeholder="Ingrese su contraseña"
          />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <div class="invalid-feedback" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
          <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-group" *ngIf="errorMessage">
        <div class="alert alert-danger">
          {{ errorMessage }}
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="text-center position-relative my-4">
              <hr>
              <span class="px-3 bg-white position-relative text-muted" style="top: -12px;">
                O continúa con
              </span>
            </div>

            <!-- Botones Sociales -->
            <div class="d-grid gap-2">
              <button type="button" class="btn btn-outline-secondary">
                <i class="bi bi-google me-2"></i> Registrate
              </button>
            </div>

            <!-- Link Registro -->
            <div class="text-center mt-4">
              <p class="mb-0">
                ¿No tienes cuenta? 
                <a href="#" class="text-decoration-none fw-bold" >
                  Regístrate aquí
                </a>
              </p>
            </div>
    </form>
  </div>
</div>
