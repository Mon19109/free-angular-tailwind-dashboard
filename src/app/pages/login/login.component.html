<!-- login.component.html -->
<div class="login-container bg-login">
  <div class="login-card">
    <div class="login-header">
      <img src="https://portal-antares.kashplataforma.com/public/assets/img/kashpay_dorado.png" alt="Logo" class="logo">
      <!--h4>Bienvenido</h4>
      <p>Ingresa tus credenciales para continuar</p-->
      <p class="text-muted">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" formControlName="userLogin"
          [class.is-invalid]="loginForm.get('userLogin')?.invalid && loginForm.get('userLogin')?.touched"
          placeholder="usuario@ejemplo.com" />
        <div class="invalid-feedback"
          *ngIf="loginForm.get('userLogin')?.invalid && loginForm.get('userLogin')?.touched">
          Correo requerido
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="passwordLogin"
            [class.is-invalid]="loginForm.get('passwordLogin')?.invalid && loginForm.get('passwordLogin')?.touched"
            placeholder="Ingrese su contraseña" />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <div class="error" *ngIf="loginForm.get('passwordLogin')?.invalid && loginForm.get('passwordLogin')?.touched">
          <span *ngIf="loginForm.get('passwordLogin')?.errors?.['required']">Contraseña requerida</span>
          <span *ngIf="loginForm.get('passwordLogin')?.errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-group" *ngIf="errorMessage">
        <div class="alert alert-danger">
          {{ errorMessage }}
        </div>
      </div>


      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      
        <div class="auth-divider" aria-hidden="true">
          <span>O se parte de Kashpay</span>
        </div>

        <!-- Botones Sociales -->
        <div class="d-grid gap-2">
          <a routerLink="/preregistro"
            class="btn-dorado inline-flex items-center justify-center gap-3 py-3 text-sm font-normal transition-colors rounded-lg px-7 hover:bg-gray-200 hover:text-gray-800 dark:bg-white/5 dark:text-white/90 dark:hover:bg-white/10">
            Iniciar preregistro
          </a>
        </div>

        <!-- Link Registro -->
        <div class="text-center mt-4">
          <p class="mb-0">
            ¿Olvidaste tu contraseña?
            <a href="#" class="text-decoration-none fw-bold">
              Recuperar cuenta
            </a>
          </p>
        </div>
    </form>
  </div>
</div>


<div class="token-modal-backdrop" *ngIf="showTokenModal">
  <div class="token-modal" role="dialog" aria-modal="true" aria-labelledby="token-modal-title">
    <button
      type="button"
      class="token-modal-close"
      aria-label="Cerrar"
      [disabled]="loading"
      (click)="closeTokenModal()"
    >
      &times;
    </button>

    <form (ngSubmit)="validateToken()">
      <div class="token-modal-body">
        <label id="token-modal-title" for="login-token">
          Ingresa el token enviado al dispositivo registrado con terminación ** **** **{{ telModal }}
        </label>
        <textarea
          id="login-token"
          name="verification-token-field"
          [(ngModel)]="tokenValue"
          [ngModelOptions]="{ standalone: true }"
          autocomplete="new-password"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          rows="1"
          [disabled]="loading"
          (keydown.enter)="$event.preventDefault(); validateToken()"
          autofocus
        ></textarea>
      </div>

      <div class="token-modal-actions">
        <button type="submit" class="token-btn token-btn-primary" [disabled]="loading">
          VALIDAR
        </button>
        <button type="button" class="token-btn token-btn-secondary" [disabled]="loading" (click)="closeTokenModal()">
          CANCELAR
        </button>
      </div>
    </form>
  </div>
</div>
